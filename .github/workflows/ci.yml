name: CI

on:
  push:
    branches: [main]
  pull_request:

# Задания: sanitizer, api, web, migrations, compose.

jobs:
  sanitizer:
    name: rubezh-sanitizer — тесты, линт, типы
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rubezh-sanitizer
    steps:
      - uses: actions/checkout@v4
      - name: Установить uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
      - name: Синхронизировать зависимости
        run: uv sync --frozen
      - name: Линт — ruff
        run: uv run ruff check app tests
      - name: Проверка типов — mypy
        run: uv run mypy app
      - name: Тесты — pytest
        run: uv run pytest

  migrations:
    name: Миграции БД и проверка схемы
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rubezh
          POSTGRES_PASSWORD: rubezh
          POSTGRES_DB: rubezh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rubezh -d rubezh"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - name: Применить миграции
        run: >-
          docker run --rm --network host
          -v "${{ github.workspace }}/rubezh-api/migrations:/migrations:ro"
          migrate/migrate:v4.18.1
          -path=/migrations
          -database="postgres://rubezh:rubezh@localhost:5432/rubezh?sslmode=disable" up
      - name: Проверить схему БД
        env:
          PGPASSWORD: rubezh
        run: >-
          psql -h localhost -U rubezh -d rubezh -v ON_ERROR_STOP=1
          -f rubezh-api/migrations/tests/verify_schema.sql

  api:
    name: rubezh-api — сборка, тесты, vet, формат
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rubezh
          POSTGRES_PASSWORD: rubezh
          POSTGRES_DB: rubezh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rubezh -d rubezh"
          --health-interval 5s --health-timeout 5s --health-retries 12
    defaults:
      run:
        working-directory: rubezh-api
    steps:
      - uses: actions/checkout@v4
      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Применить миграции БД
        run: >-
          docker run --rm --network host
          -v "${{ github.workspace }}/rubezh-api/migrations:/migrations:ro"
          migrate/migrate:v4.18.1
          -path=/migrations
          -database="postgres://rubezh:rubezh@localhost:5432/rubezh?sslmode=disable" up
      - name: Сборка
        run: go build ./...
      - name: Проверка формата — gofmt
        run: test -z "$(gofmt -l .)"
      - name: Статический анализ — go vet
        run: go vet ./...
      - name: Тесты (детектор гонок)
        run: go test -race ./...
        env:
          TEST_DATABASE_URL: postgres://rubezh:rubezh@localhost:5432/rubezh?sslmode=disable

  web:
    name: rubezh-web — тесты и сборка
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rubezh-web
    steps:
      - uses: actions/checkout@v4
      - name: Установить Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rubezh-web/package-lock.json
      - name: Установить зависимости
        run: npm ci
      - name: Тесты (Vitest, в т. ч. контракт Go↔TS — G.1)
        run: npm test
      - name: Сборка (tsc + vite)
        run: npm run build

  contract-sync:
    name: Контракт Go↔TS синхронизирован (G.1 golden)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rubezh-api
    steps:
      - uses: actions/checkout@v4
      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Перегенерировать контракты и проверить отсутствие дрейфа
        run: |
          go test ./internal/api/ -run TestContractShape -count=1
          test -z "$(git status --porcelain rubezh-web/src/test/contracts)"

  compose:
    name: Сборка образов и проверка docker compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Проверить конфигурацию compose
        run: docker compose config --quiet
      - name: Собрать образ rubezh-sanitizer
        run: docker compose build rubezh-sanitizer
      - name: Собрать образ rubezh-api
        run: docker compose build rubezh-api
