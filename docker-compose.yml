# Рубеж ИИ — Docker Compose (MVP).
#
# Итерация 0 — инфраструктурные сервисы (PostgreSQL + pgvector, MinIO).
# Прикладные сервисы добавляются в своих итерациях:
#   migrate          — итерация 1 (добавлен)
#   rubezh-sanitizer — итерация 2 (добавлен)
#   rubezh-api       — итерация 5 (добавлен)
#   rubezh-worker    — итерация 10
#   rubezh-web       — итерация 12
#
# Запуск инфраструктуры:  docker compose up -d postgres minio
# Проверка конфигурации:  docker compose config

name: rubezh-ai

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rubezh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rubezh}
      POSTGRES_DB: ${POSTGRES_DB:-rubezh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rubezh} -d ${POSTGRES_DB:-rubezh}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - rubezh
    restart: unless-stopped

  minio:
    # Релиз MinIO зафиксирован по тегу. Выбрана свежая версия (актуальность CVE);
    # периодическая ревизия образа — задача сопровождения (docs/SECURITY_CHECKLIST.md).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rubezh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rubezh-minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # `mc` входит в образ MinIO; healthcheck подтверждён фактическим запуском.
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - rubezh
    restart: unless-stopped

  # Применение миграций БД (one-shot, golang-migrate). Profile 'migrate' —
  # сервис не стартует при обычном `up`. Запуск: docker compose run --rm migrate
  migrate:
    image: migrate/migrate:v4.18.1
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./rubezh-api/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-rubezh}:${POSTGRES_PASSWORD:-rubezh}@postgres:5432/${POSTGRES_DB:-rubezh}?sslmode=disable"
      - "up"
    networks:
      - rubezh
    restart: "no"

  # Сервис обезличивания: детекторы ПДн/секретов, маскирование, risk scoring.
  rubezh-sanitizer:
    build: ./rubezh-sanitizer
    environment:
      SANITIZER_PORT: 8001
      MAPPING_ENCRYPTION_KEY: ${MAPPING_ENCRYPTION_KEY:-}
      # LLM-review (фильтр 2/3). Пусто → фильтр отключён (только regex).
      # Из контейнера локальная LM Studio доступна как host.docker.internal.
      SANITIZER_LLM_URL: ${SANITIZER_LLM_URL:-}
      SANITIZER_LLM_MODEL: ${SANITIZER_LLM_MODEL:-}
      SANITIZER_LLM_KEY: ${SANITIZER_LLM_KEY:-}
      SANITIZER_LLM_TIMEOUT: ${SANITIZER_LLM_TIMEOUT:-5.0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SANITIZER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - rubezh
    restart: unless-stopped

  # API Gateway: оркестрация, auth, Policy Engine, LLM Router, Audit API.
  rubezh-api:
    build: ./rubezh-api
    environment:
      API_PORT: 8080
      API_LOG_LEVEL: info
      POSTGRES_USER: ${POSTGRES_USER:-rubezh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rubezh}
      POSTGRES_DB: ${POSTGRES_DB:-rubezh}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      AUTH_DEV_TOKEN_SECRET: ${AUTH_DEV_TOKEN_SECRET:-change_me_dev_only}
      SANITIZER_URL: http://rubezh-sanitizer:8001
      MAPPING_ENCRYPTION_KEY: ${MAPPING_ENCRYPTION_KEY:?MAPPING_ENCRYPTION_KEY обязателен (base64 32 байта)}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rubezh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rubezh-minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-rubezh-documents}
      MINIO_SECURE: "false"
      # OIDC-вход (K.1). Пусто → выключен, остаётся dev-login.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_FRONTEND_URL: ${OIDC_FRONTEND_URL:-http://localhost:5173}
      OIDC_ROLE_CLAIM: ${OIDC_ROLE_CLAIM:-}
      OIDC_ROLE_MAP: ${OIDC_ROLE_MAP:-}
      # Embedder (Итерация 11 §Р2). Симметрия с rubezh-worker обязательна.
      EMBEDDER_KIND: ${EMBEDDER_KIND:-mock}
      EMBEDDER_URL: ${EMBEDDER_URL:-}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-}
      EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-}
      EMBEDDER_TIMEOUT_SECONDS: ${EMBEDDER_TIMEOUT_SECONDS:-30}
      # Operator-level RAG-toggle (Итерация 11 MINOR-4). Default — true.
      # RAG_ENABLED=false полностью отключает retrieval в orchestrator.
      RAG_ENABLED: ${RAG_ENABLED:-true}
    extra_hosts:
      # позволяет EMBEDDER_URL=http://host.docker.internal:1234 (LM Studio).
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rubezh-sanitizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/rubezh-api", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - rubezh
    restart: unless-stopped

  # Worker: парсинг документов, chunking, embeddings, БД-очередь (Итерация 10).
  rubezh-worker:
    build: ./rubezh-worker
    environment:
      WORKER_PORT: 8002
      WORKER_LOG_LEVEL: info
      DATABASE_URL: postgres://${POSTGRES_USER:-rubezh}:${POSTGRES_PASSWORD:-rubezh}@postgres:5432/${POSTGRES_DB:-rubezh}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rubezh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rubezh-minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-rubezh-documents}
      MINIO_SECURE: "false"
      SANITIZER_URL: http://rubezh-sanitizer:8001
      # Embedder — симметрия с rubezh-api (Итерация 11 §Р2).
      EMBEDDER_KIND: ${EMBEDDER_KIND:-mock}
      EMBEDDER_URL: ${EMBEDDER_URL:-}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-}
      EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-}
      EMBEDDER_TIMEOUT_SECONDS: ${EMBEDDER_TIMEOUT_SECONDS:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rubezh-sanitizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - rubezh
    restart: unless-stopped

  # Frontend (Итерация 12+): React + Vite, serve через Nginx.
  rubezh-web:
    build: ./rubezh-web
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      rubezh-api:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (а не localhost): wget внутри alpine пробует IPv6 первым,
      # nginx по умолчанию слушает только IPv4 — было причиной unhealthy.
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - rubezh
    restart: unless-stopped

  # dex — reference dev-IdP для теста OIDC-входа (K.1). Профиль dev-idp:
  # не поднимается по умолчанию. Запуск: docker compose --profile dev-idp up -d dex
  # Требует строки `127.0.0.1 dex` в hosts-файле ОС (см. deploy/dex/config.yaml).
  dex:
    image: dexidp/dex:v2.41.1
    profiles: ["dev-idp"]
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./deploy/dex/config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    networks:
      rubezh:
        aliases:
          - dex
    restart: unless-stopped

networks:
  rubezh:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
