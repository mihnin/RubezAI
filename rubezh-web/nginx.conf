# rubezh-web — Nginx-конфиг.
# 1. SPA-fallback: все не-API роуты → /index.html (React Router v7).
# 2. /api → rubezh-api:8080 (proxy в docker-compose сети).
# 3. SSE-поддержка (off chunking, off buffering).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://rubezh-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE: отключаем буферизацию и таймауты proxy.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
