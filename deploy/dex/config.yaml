# dex — reference dev-IdP для локального теста OIDC-входа «Рубежа» (K.1).
# В проде заказчик указывает свой issuer (AD/ADFS/Keycloak/Avanpost/…) —
# dex нужен только чтобы было где залогиниться при разработке.
#
# ВАЖНО (docker-сеть): issuer един для браузера и контейнера. Чтобы оба
# резолвили один хост `dex`, добавьте в hosts-файл ОС строку:
#   127.0.0.1   dex
# (Windows: C:\Windows\System32\drivers\etc\hosts). Тогда браузер идёт на
# dex:5556 (порт опубликован), а rubezh-api — на dex:5556 (compose DNS).
issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: rubezh
    name: "Рубеж ИИ"
    secret: rubezh-dev-client-secret
    redirectURIs:
      - "http://localhost:8080/api/auth/oidc/callback"

enablePasswordDB: true
# Тестовый сотрудник. Пароль: "password" (bcrypt-хеш ниже).
staticPasswords:
  - email: "ivanov@corp.example"
    hash: "$2y$10$ghoDXQNdSraLWIlivwoF3uN/JY9F49kgZbP5btl4cA.Gkpq3mbcI6"
    username: "ivanov"
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
